<!DOCTYPE html>
<html lang="ru" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>AI PROFIT — Football AI Analytics</title>
  <meta name="description" content="AI algorithm analyzes football matches and delivers precise signals. 9 out of 10 predictions correct." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AI PROFIT — Football AI" />
  <meta property="og:locale" content="ru_RU" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23080910'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui' font-size='18' font-weight='800' fill='%234C8EFF'%3E⚽%3C/text%3E%3C/svg%3E" />

  <style>
    :root {
      --bg:       #080910;
      --bg2:      #0D0E1A;
      --surface:  #111220;
      --border:   #1C1E30;
      --border2:  #252740;
      --accent:   #4C8EFF;
      --accent-h: #6BA3FF;
      --green:    #22D078;
      --text:     #E4E6FF;
      --muted:    #656780;
      --muted2:   #3E4060;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:       #F2F4FB;
        --bg2:      #EAECF7;
        --surface:  #FFFFFF;
        --border:   #DDE0F0;
        --border2:  #CBD0E8;
        --accent:   #3376F0;
        --accent-h: #1F5FDB;
        --green:    #0EAA60;
        --text:     #0A0B1A;
        --muted:    #6B6E90;
        --muted2:   #B0B4D0;
      }
    }
    :root[data-theme="dark"] {
      --bg:#080910;--bg2:#0D0E1A;--surface:#111220;--border:#1C1E30;--border2:#252740;
      --accent:#4C8EFF;--accent-h:#6BA3FF;--green:#22D078;
      --text:#E4E6FF;--muted:#656780;--muted2:#3E4060;
    }
    :root[data-theme="light"] {
      --bg:#F2F4FB;--bg2:#EAECF7;--surface:#FFFFFF;--border:#DDE0F0;--border2:#CBD0E8;
      --accent:#3376F0;--accent-h:#1F5FDB;--green:#0EAA60;
      --text:#0A0B1A;--muted:#6B6E90;--muted2:#B0B4D0;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%}

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Lang switcher ── */
    .lang-switcher {
      position: fixed;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 2px;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      box-shadow: 0 2px 12px rgba(0,0,0,.18);
    }
    .lang-btn {
      background: none;
      border: none;
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn:hover { color: var(--text); background: var(--bg2); }
    .lang-btn.active { background: var(--accent); color: #fff; }

    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 48px;
      position: relative;
      z-index: 1;
    }

    /* ── Hero ── */
    .hero {
      padding: 52px 0 40px;
      text-align: center;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      padding: 6px 14px;
      border: 1px solid var(--border2);
      border-radius: 100px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100%{opacity:1;box-shadow:0 0 6px var(--green)}
      50%{opacity:.6;box-shadow:0 0 14px var(--green)}
    }

    .logo-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-title {
      font-size: clamp(28px, 8vw, 36px);
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1.15;
      text-wrap: balance;
      color: var(--text);
      margin-bottom: 16px;
    }

    .hero-title em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-sub {
      font-size: 15px;
      font-weight: 300;
      color: var(--muted);
      text-wrap: balance;
      line-height: 1.65;
      margin-bottom: 36px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Solo stat ── */
    .stat-solo {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 20px 22px;
      text-align: center;
      margin-bottom: 36px;
    }
    .stat-num {
      display: block;
      font-size: clamp(52px, 16vw, 72px);
      font-weight: 800;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      margin-bottom: 8px;
      color: var(--green);
    }
    .stat-label {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    /* ── CTA primary ── */
    .cta-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 24px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      margin-bottom: 10px;
    }

    .cta-main:hover  { background: var(--accent-h); }
    .cta-main:active { transform: scale(0.98); }
    .cta-main:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    .cta-hint {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 0;
    }

    /* ── Divider ── */
    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 40px 0;
    }

    /* ── How it works ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .steps { display: flex; flex-direction: column; gap: 0; }

    .step {
      display: flex;
      gap: 16px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .step:last-child { border-bottom: none; }

    .step-num {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .step-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .step-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }

    /* ── Reviews ── */
    .reviews { display: flex; flex-direction: column; gap: 10px; }

    .review {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .review-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .review-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--bg2);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .review-date {
      font-size: 11px;
      color: var(--muted);
    }

    .review-stars {
      margin-left: auto;
      color: #F5A623;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .review-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .review-text strong { color: var(--text); font-weight: 600; }

    /* ── Bottom CTA ── */
    .bottom-cta {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 24px 28px;
      text-align: center;
    }

    .bottom-cta-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.4px;
      text-wrap: balance;
      margin-bottom: 24px;
      line-height: 1.35;
    }

    .cta-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px 20px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .cta-secondary:hover { background: var(--bg2); border-color: var(--accent); }

    /* ── Archive ── */
    .archive-list { display: flex; flex-direction: column; gap: 8px; }
    .arch-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .arch-match { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .arch-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .arch-pred { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .arch-pred strong { color: var(--text); }
    .arch-result { font-size: 12px; color: var(--muted); }
    .arch-badge {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 7px;
      background: rgba(34,208,120,.15);
      color: var(--green);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Footer ── */
    footer { margin-top: 36px; text-align: center; }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 10px;
    }

    .footer-links a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s;
    }
    .footer-links a:hover { color: var(--text); }

    .footer-copy { font-size: 11px; color: var(--muted2); }

    /* ── Noise ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      z-index: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-dot { animation: none; }
      .cta-main,.cta-secondary { transition: none; }
    }
  </style>
</head>

  // Archive data (shared)
  var ARCHIVE = [
    { date: '10.07', pred: 'total_over',  score: '3–2', round: 'final' },
    { date: '08.07', pred: 'win_esp',     score: '2–0', round: 'semi' },

  ];

  // ── Apply language ────────────────────────────────────────────
  var currentLang = 'ru';

  function applyLang(lang) {
    var t = T[lang] || T.ru;
    currentLang = lang;

    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) el.innerHTML = t[key];
    });

    // Archive button
    var archBtn = document.getElementById('archive-btn');
    var panel = document.getElementById('archive-panel');
    if (archBtn) archBtn.textContent = panel.hidden ? t.archBtn : t.archClose;

    // Render archive
    var list = document.getElementById('archive-list');
    if (list) {
      list.innerHTML = ARCHIVE.map(function(m, i) {
        return '<div class="arch-item">' +
          '<div class="arch-match">' + (t.matches[i] || '') + '</div>' +
          '<div class="arch-meta">' + m.date + ' · ' + t.wc + ' · ' + t[m.round] + '</div>' +
          '<div class="arch-pred">' + t.pred + ': <strong>' + (t.preds[m.pred] || '') + '</strong></div>' +
          '<div class="arch-result">' + t.score + ': ' + m.score + ' <span class="arch-badge">' + t.correct + '</span></div>' +
          '</div>';
      }).join('');
    }

    // Switcher active state
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });

    document.documentElement.lang = lang;
    localStorage.setItem('lang', lang);
  }

  // ── Toggle archive ────────────────────────────────────────────
  function toggleArchive(btn) {
    var panel = document.getElementById('archive-panel');
    var open = !panel.hidden;
    panel.hidden = open;
    btn.setAttribute('aria-expanded', String(!open));
    var t = T[currentLang] || T.ru;
    btn.textContent = open ? t.archBtn : t.archClose;
  }

  function handleClick(e, url) {
    e.preventDefault();
    setTimeout(function() { window.open(url, '_blank', 'noopener,noreferrer'); }, 80);
  }

  // ── Init ─────────────────────────────────────────────────────
  (function() {
    // Theme
    var theme = localStorage.getItem('theme');
    if (theme === 'dark' || theme === 'light') {
      document.documentElement.setAttribute('data-theme', theme);
    }

    // Lang: URL param → localStorage → navigator.language → en
    var urlLang = new URLSearchParams(window.location.search).get('lang');
    var saved = localStorage.getItem('lang');
    var navRaw = (navigator.language || '').slice(0, 2).toLowerCase();
    var navMap = { kk: 'kz', uk: 'ru', be: 'ru' };
    var nav = navMap[navRaw] || navRaw;
    var lang = (urlLang && T[urlLang]) ? urlLang : (saved && T[saved]) ? saved : (T[nav] ? nav : 'en');
    applyLang(lang);
    if (urlLang) { history.replaceState(null, '', window.location.pathname); }

    // Lang switcher clicks
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { applyLang(btn.dataset.lang); });
    });

    // Accuracy counter
    var el = document.getElementById('accuracy-counter');
    if (el) {
      var target = 9, duration = 1400, start = null;
      function step(ts) {
        if (!start) start = ts;
        var p = Math.min((ts - start) / duration, 1);
        var ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.floor(ease * target) + '/10';
        if (p < 1) requestAnimationFrame(step);
        else el.textContent = '9/10';
      }
      if ('IntersectionObserver' in window) {
        var obs = new IntersectionObserver(function(entries) {
          if (entries[0].isIntersecting) { requestAnimationFrame(step); obs.disconnect(); }
        }, { threshold: .3 });
        obs.observe(el);
      } else {
        requestAnimationFrame(step);
      }
    }
  })();
</script>
